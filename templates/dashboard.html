<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarthi AI | Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; box-sizing: border-box;}
        
        /* Adjusted for better mobile margins */
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; box-sizing: border-box; }
        
        .btn { display: block; background: #2979ff; color: white; padding: 20px; font-size: 22px; text-decoration: none; border-radius: 10px; margin: 20px 0; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        .btn:hover { background: #2264d1; transform: translateY(-2px); box-shadow: 0 0 15px rgba(41, 121, 255, 0.5); }

        /* 🚀 MOBILE RESPONSIVE FIX: Scale down fonts on small screens */
        @media (max-width: 650px) {
            .container {
                padding: 30px 20px;
                width: 95%;
            }
            h1 {
                font-size: 28px !important;
            }
            p {
                font-size: 16px !important;
                margin-bottom: 30px !important;
            }
            .btn {
                font-size: 18px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 style="margin-top: 0; font-size: 36px;">Sarthi AI</h1>
    <p style="color: #ccc; font-size: 20px; margin-bottom: 40px;">Multilingual Universal Kiosk</p>
    
    <a href="/railway" class="btn">🚂 Book a Train Ticket</a>
    <a href="/pension" class="btn">🏛️ Fill Pension Form</a>
</div>
</body>
</html>
