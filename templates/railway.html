<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sarthi AI | Railway Booking</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 80%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .ai-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 20px; position: sticky; top: 0; background: rgba(32, 58, 67, 0.9); z-index: 10; padding-top: 10px;}
        .ai-status { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 600; color: #00e676; }
        .orb { width: 20px; height: 20px; background: #00e676; border-radius: 50%; box-shadow: 0 0 10px #00e676; transition: all 0.3s ease; }
        .status-listening .orb { background: #ff1744; box-shadow: 0 0 20px #ff1744; animation: pulse-red 1s infinite; }
        .status-listening { color: #ff1744; }
        .status-thinking .orb { background: #2979ff; box-shadow: 0 0 20px #2979ff; animation: spin 1s infinite linear; }
        .status-thinking { color: #2979ff; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        input[type="text"] { padding: 15px; width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 10px; font-size: 16px; color: #333; transition: 0.3s; }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 15px rgba(41, 121, 255, 0.5); }
        .btn-success { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; background: #00e676; color: #121212; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-success:hover { background: #00c853; transform: translateY(-2px); }
        .back-link { color: #aaa; text-decoration: none; display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="ai-header">
        <div><h1 style="margin: 0;">🚂 Railway Booking</h1></div>
        <div class="ai-status" id="aiStatusText"><div class="orb" id="aiOrb"></div><span id="statusLabel">System Ready</span></div>
    </div>

    <div class="form-grid">
        <input type="text" id="station_from" placeholder="1. Boarding Station">
        <input type="text" id="station_to" placeholder="2. Destination Station">
        
        <input type="text" id="travel_date" placeholder="3. Travel Date">
        <input type="text" id="train_name" placeholder="4. Train Name or Number">
        
        <input type="text" id="coach_class" placeholder="5. Coach Class (Sleeper, AC)">
        <input type="text" id="passengers" placeholder="6. Number of Passengers">
        
        <input type="text" id="lead_name" class="full-width" placeholder="7. Lead Passenger Name">
        <input type="text" id="lead_age" placeholder="8. Passenger Age">
        <input type="text" id="food_choice" placeholder="9. Food Preference (Veg/Non-Veg)">
        
        <input type="text" id="payment_mode" class="full-width" placeholder="10. Payment Mode (UPI, Cash, Card)">
    </div>
        
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0;">
        <input type="checkbox" id="elderlyMode" style="width: 20px; height: 20px; cursor: pointer;" checked>
        <label for="elderlyMode" style="font-size: 18px; cursor: pointer;">👵 Elderly Mode (Audio Prompts)</label>
    </div>
    
    <button class="btn-success" id="startBtn" onclick="startVoice()">🎤 Start Booking</button>
    <a href="/" class="back-link">⬅️ Back to Dashboard</a>
</div>

<script>
    // 10-FIELD CONFIGURATION FOR RAILWAY FORM
    window.pagePipeline = [
        "station_from", "station_to", "travel_date", "train_name", 
        "coach_class", "passengers", "lead_name", "lead_age", 
        "food_choice", "payment_mode"
    ];
    
    // Reads English text with a localized Indian accent
    window.promptLanguage = "en-IN"; 
    
    // Pure English Audio Prompts
    window.voicePrompts = {
        "station_from": "Which station are you boarding from?",
        "station_to": "What is your destination station?",
        "travel_date": "What is your date of travel?",
        "train_name": "What is the train name or number?",
        "coach_class": "Which coach class do you prefer? Sleeper or A C?",
        "passengers": "How many passengers are traveling?",
        "lead_name": "What is the name of the main passenger?",
        "lead_age": "What is the age of the passenger?",
        "food_choice": "Do you prefer vegetarian or non-vegetarian food?",
        "payment_mode": "How would you like to pay? U P I, cash, or card?"
    };
</script>
<script src="/static/script.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
