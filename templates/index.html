<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sarthi AI | Universal Form Engine</title>
    <style>
        /* Modern UI Reset & Background */
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 80%;
            max-width: 900px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* AI Status Header */
        .ai-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #00e676; /* Default Ready Green */
        }

        /* The Glowing Orb */
        .orb {
            width: 20px;
            height: 20px;
            background: #00e676;
            border-radius: 50%;
            box-shadow: 0 0 10px #00e676;
            transition: all 0.3s ease;
        }

        /* AI Processing States */
        .status-listening .orb {
            background: #ff1744;
            box-shadow: 0 0 20px #ff1744;
            animation: pulse-red 1s infinite;
        }
        .status-listening { color: #ff1744; }

        .status-thinking .orb {
            background: #2979ff;
            box-shadow: 0 0 20px #2979ff;
            animation: spin 1s infinite linear;
        }
        .status-thinking { color: #2979ff; }

        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Modern Inputs & Buttons */
        .section { margin: 20px 0; display: flex; gap: 10px; justify-content: center;}
        
        input[type="text"] {
            padding: 12px 20px;
            width: 60%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            color: #333;
            transition: 0.3s;
        }

        input[type="text"]:focus { outline: none; box-shadow: 0 0 15px rgba(41, 121, 255, 0.5); }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: #2979ff; color: white; }
        .btn-primary:hover { background: #2264d1; transform: translateY(-2px); }

        .btn-success { background: #00e676; color: #121212; width: 100%; margin-top: 20px; }
        .btn-success:hover { background: #00c853; transform: translateY(-2px); }

        /* External Form Iframe */
        iframe {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: white;
            margin-top: 20px;
        }

        /* Practice Area */
        .practice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-header">
        <div>
            <h1 style="margin: 0; font-size: 28px;">Sarthi AI</h1>
            <p style="margin: 5px 0 0 0; color: #aaa;">Multilingual Form Engine</p>
        </div>
        <div class="ai-status" id="aiStatusText">
            <div class="orb" id="aiOrb"></div>
            <span id="statusLabel">System Ready</span>
        </div>
    </div>

    

    <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px;">
        <h3 style="margin-top:0;">Local Practice Form (To test Context Logic)</h3>
        <div class="practice-grid">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="age" placeholder="Age">
            <input type="text" id="gender" placeholder="Gender">
        </div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; margin-bottom: 15px;">
            <input type="checkbox" id="elderlyMode" style="width: 20px; height: 20px; cursor: pointer;">
            <label for="elderlyMode" style="font-size: 18px; cursor: pointer;">👵 Elderly Mode (Audio Prompts)</label>
        </div>
        <button class="btn-success" id="startBtn" onclick="startVoice()">🎤 Start Voice Assistant</button>
    </div>

    <iframe id="formFrame"></iframe>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
